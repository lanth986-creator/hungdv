services:
  - type: web
    name: hungdv
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build && cd ../backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hungdv-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false
      - key: SESSION_DAYS
        value: "7"
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
    healthCheckPath: /api/health

databases:
  - name: hungdv-db
    plan: free
    databaseName: hungdv
    user: hungdv
