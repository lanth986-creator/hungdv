services:
  # Backend API
  - type: web
    name: hungdv-backend
    runtime: node
    plan: free
    buildCommand: cd backend && npm install
    startCommand: cd backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hungdv-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false
      - key: SESSION_DAYS
        value: "7"
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
    healthCheckPath: /api/health

  # Frontend (Static Site)
  - type: static_site
    name: hungdv-frontend
    runtime: node
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /**
        destination: /index.html

databases:
  - name: hungdv-db
    plan: free
    databaseName: hungdv
    user: hungdv
